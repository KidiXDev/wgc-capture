name: Build and Release DLL

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up MSVC
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    - name: Build DLL
      shell: cmd
      run: |
        cl /LD /O2 /EHsc /std:c++17 /W4 wgc_capture.cpp /Fe:wgc_capture.dll

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: wgc_capture-x64
        path: wgc_capture.dll

    - name: Release
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: wgc_capture.dll
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
